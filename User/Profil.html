<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>

<style>
    .main-content {
    padding: 20px;
}

.profile-container{
    background: white;
    border-radius: 16px;
    padding: 30px;
    max-width: 700px;
}

.profile-header{
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 25px;
}

.profile-img{
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background-color: #ddd;
}

.profile-name{
    font-size: 18px;
    font-weight: 600;
}

.profile-role{
    font-size: 14px;
    color: gray;
}

.form-group{
    margin-bottom: 16px;
}

.form-group label{
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
}

.form-group input{
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.btn-save{
    background-color: #2A3636;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.btn-save:hover{
    background-color: #1f2a2a;
}


.user-profile {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 2px solid #ddd;
}

.user-profile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

</style>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-cube"></i>
                <span>KasMate</span>
            </div>

                <div class="menu-section">
                    <a href="Dashboard_User.html" class="menu-item"><i class="fa-solid fa-users-line"></i> Dashboard</a>
                    <a href="Tagihan_Saya.html" class="menu-item"><i class="fa-solid fa-file-invoice-dollar"></i> Tagihan Saya</a>
                    <a href="Riwayat_Pembayaran.html" class="menu-item"><i class="fa-regular fa-circle-check"></i>Riwayat Pembayaran</a>
                    <a href="Grup_Saya.html" class="menu-item"><i class="fa-regular fa-circle-check"></i>Grup Saya</a>
                    <a href="Profil.html" class="menu-item"><i class="fa-regular fa-circle-check"></i>Profil</a>
                </div>
        </aside>

     <main class="main-content">       
            <header class="topbar">
                <div class="header-text">
                    <h1>Profil</h1>
                    <p class="subtitle">Profil Pengguna</p>
                </div>
                <div class="header-right">
                </div>
            </header>

        <div class="profile-container">

            <div class="profile-header">
                <div class="user-profile">
                        <img src="../assets/user_pict.jpg" alt="Muhammad Raka">

                    </div>
                <div>
                    <div class="profile-name">Muhammad Raka</div>
                    <div class="profile-role">Anggota</div>
                </div>
            </div>

            <form>

                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" value="Muhammad Raka">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" value="raka@email.com">
                </div>

                <div class="form-group">
                    <label>Password Baru</label>
                    <input type="password" placeholder="Masukkan password baru">
                </div>

                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" placeholder="Ulangi password">
                </div>

                <button type="submit" class="btn-save">Simpan Perubahan</button>

            </form>

        </div>

    </main>
</div>

</body>
</html>
